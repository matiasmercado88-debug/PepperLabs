// ── AUDIO ──
const AC=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,d,t='square',v=.12){
  try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);
  o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}catch(e){}
}
const snd={
  jump:()=>{tone(380,.08);setTimeout(()=>tone(520,.1),70);},
  hit:()=>tone(180,.35,'sawtooth',.2),
  coin:()=>{tone(800,.04);setTimeout(()=>tone(1050,.04),50);setTimeout(()=>tone(1300,.08),100);},
  pick:()=>tone(600,.06),
  wrong:()=>tone(180,.3,'sawtooth',.2),
  success:()=>{[523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,.1,'square',.18),i*60));},
  perfect:()=>{[523,659,784,1047,1318].forEach((f,i)=>setTimeout(()=>tone(f,.12,'square',.18),i*60));},
  over:()=>{[420,330,260,190].forEach((f,i)=>setTimeout(()=>tone(f,.3,'sawtooth',.15),i*160));},
  appear:()=>{tone(660,.06);setTimeout(()=>tone(880,.08),60);},
  tap:()=>tone(1100,.04,'square',.1),
  stagewin:()=>{[523,659,784,880,1047].forEach((f,i)=>setTimeout(()=>tone(f,.15,'square',.2),i*100));},
};

function R(x,y,w,h,c){cx.fillStyle=c;cx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h));}

function fillC(x,y,r,c){cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fillStyle=c;cx.fill();}
function strokeC(x,y,r,c,lw=2){cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.strokeStyle=c;cx.lineWidth=lw;cx.stroke();}

function rRect(x,y,w,h,rad,c){
  rad=Math.min(rad,w/2,h/2);
  cx.beginPath();cx.moveTo(x+rad,y);cx.lineTo(x+w-rad,y);
  cx.quadraticCurveTo(x+w,y,x+w,y+rad);cx.lineTo(x+w,y+h-rad);
  cx.quadraticCurveTo(x+w,y+h,x+w-rad,y+h);cx.lineTo(x+rad,y+h);
  cx.quadraticCurveTo(x,y+h,x,y+h-rad);cx.lineTo(x,y+rad);
  cx.quadraticCurveTo(x,y,x+rad,y);cx.closePath();cx.fillStyle=c;cx.fill();
}

function rRectS(x,y,w,h,rad,c,lw=2){
  rad=Math.min(rad,w/2,h/2);
  cx.beginPath();cx.moveTo(x+rad,y);cx.lineTo(x+w-rad,y);
  cx.quadraticCurveTo(x+w,y,x+w,y+rad);cx.lineTo(x+w,y+h-rad);
  cx.quadraticCurveTo(x+w,y+h,x+w-rad,y+h);cx.lineTo(x+rad,y+h);
  cx.quadraticCurveTo(x,y+h,x,y+h-rad);cx.lineTo(x,y+rad);
  cx.quadraticCurveTo(x,y,x+rad,y);cx.closePath();cx.strokeStyle=c;cx.lineWidth=lw;cx.stroke();
}

function gradRect(x,y,w,h,c1,c2,vert=true){
  const g=vert?cx.createLinearGradient(x,y,x,y+h):cx.createLinearGradient(x,y,x+w,y);
  g.addColorStop(0,c1);g.addColorStop(1,c2);cx.fillStyle=g;cx.fillRect(x,y,w,h);
}

function gradC(x,y,r,c1,c2){
  const g=cx.createRadialGradient(x-r*.3,y-r*.3,0,x,y,r);
  g.addColorStop(0,c1);g.addColorStop(1,c2);
  cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fillStyle=g;cx.fill();
}

function txtOut(t,x,y,fc,oc,lw=5){
  cx.save();cx.strokeStyle=oc;cx.lineWidth=lw;cx.lineJoin='round';
  cx.strokeText(t,x,y);cx.fillStyle=fc;cx.fillText(t,x,y);cx.restore();
}

function withGlow(f,c,b=20){cx.save();cx.shadowColor=c;cx.shadowBlur=b;f();cx.restore();}

function drawCloud(x,y,w){
  cx.save();
  // shadow
  cx.globalAlpha=.12;cx.fillStyle='#6090c0';
  [[.15,.08,.18],[.38,-.12,.22],[.58,-.07,.2],[.77,.08,.17],[.5,.08,.25]].forEach(([px,py,pr])=>{
    cx.beginPath();cx.arc(x+px*w,y+py*w+10,pr*w,0,Math.PI*2);cx.fill();
  });
  cx.globalAlpha=1;
  // white cloud
  cx.fillStyle='#fff';
  [[.15,0,.18],[.38,-.12,.22],[.58,-.07,.2],[.77,0,.17],[.5,0,.25]].forEach(([px,py,pr])=>{
    cx.beginPath();cx.arc(x+px*w,y+py*w,pr*w,0,Math.PI*2);cx.fill();
  });
  // highlight
  cx.globalAlpha=.5;cx.fillStyle='rgba(255,255,255,.9)';
  cx.beginPath();cx.arc(x+.35*w,y-.1*w,0.1*w,0,Math.PI*2);cx.fill();
  cx.restore();
}

function drawStar5(x,y,r,c){
  cx.beginPath();
  for(let i=0;i<10;i++){
    const a=i*Math.PI/5-Math.PI/2,ri=i%2===0?r:r*.42;
    i===0?cx.moveTo(x+Math.cos(a)*ri,y+Math.sin(a)*ri):cx.lineTo(x+Math.cos(a)*ri,y+Math.sin(a)*ri);
  }
  cx.closePath();cx.fillStyle=c;cx.fill();
}

//  MAMILA CHARACTER — SEGA STYLE
// ══════════════════════════════════════════════════
function drawMamila(ox,oy,s,pose,inv=0){
  if(inv>0&&Math.floor(inv/4)%2===0)return;

  const fW=18*s,fH=22*s,bOff=(18-16)/2*s,bx=ox+bOff,bs=20*s;
  const bob=(pose==='idle')?Math.sin(idleAnim)*3:0;

  cx.save();
  let tx=0,ty=bob;
  if(pose==='dodge')tx=-16;
  if(pose==='dance'){tx=Math.sin(idleAnim*.3)*6;ty=Math.abs(Math.sin(idleAnim*.3))*4;}
  if(pose==='fail'){tx=10;ty=8;}
  cx.translate(tx,ty);

  // GROUND SHADOW
  if(pose!=='jump'){
    cx.save();cx.globalAlpha=.18;
    cx.beginPath();cx.ellipse(ox+fW/2,oy+bs+50*s,15*s,4*s,0,0,Math.PI*2);
    cx.fillStyle='#000';cx.fill();cx.restore();
  }

  // FACE — circle clip with dark outline ring
  cx.save();
  // outer glow ring when invincible
  if(inv>0){
    const hue=Math.floor((inv*20))%360;
    cx.shadowColor=`hsl(${hue},100%,60%)`;cx.shadowBlur=20;
  }
  // outline ring
  cx.beginPath();cx.ellipse(ox+fW/2,oy+fH*.44,(fW/2)+2*s,(fH/2)+2*s,0,0,Math.PI*2);
  cx.fillStyle='#111';cx.fill();
  // face clip
  cx.beginPath();cx.ellipse(ox+fW/2,oy+fH*.44,fW/2,fH/2,0,0,Math.PI*2);cx.clip();
  cx.drawImage(face,ox,oy,fW,fH);
  // face shine
  cx.globalAlpha=.18;cx.fillStyle='#fff';
  cx.beginPath();cx.ellipse(ox+fW*.35,oy+fH*.2,fW*.22,fH*.14,-0.4,0,Math.PI*2);cx.fill();
  cx.restore();

  const skin='#c8845a',skinD='#a06035',skinHL='#e09870';

  // BODY — jacket with gradient
  cx.save();
  const bG=cx.createLinearGradient(bx,oy+bs,bx+16*s,oy+bs);
  bG.addColorStop(0,'#181818');bG.addColorStop(.35,'#2e2e2e');bG.addColorStop(.7,'#222');bG.addColorStop(1,'#101010');
  rRect(bx-s,oy+bs-s,18*s,16*s,2*s,'#080808'); // outline
  rRect(bx,oy+bs,16*s,14*s,2*s,bG);             // body
  // shoulder highlight
  R(bx+2*s,oy+bs+s,5*s,s,'rgba(255,255,255,.18)');
  cx.restore();

  // COLLAR
  rRect(bx+2*s,oy+bs,12*s,3*s,2*s,'#1a1a1a');
  R(bx+6*s,oy+bs,4*s,3*s,'#282828'); // collar notch

  // BADGE — El Carro logo
  cx.save();
  cx.shadowColor='#c85a1a';cx.shadowBlur=8;
  const lx=bx+10.5*s,ly=oy+bs+8*s;
  fillC(lx,ly,3*s,'#c85a1a');
  cx.shadowBlur=0;
  fillC(lx,ly,2.2*s,'#0f0d0b');
  cx.restore();
  withGlow(()=>R(lx-.4*s,ly-3.2*s,.8*s,2.8*s,'#e8961e'),'#e8961e',8);

  // ARMS — outline then skin
  // Left arm
  rRect(bx-2*s,oy+bs+s,4*s,11*s,1.5*s,'#080808');
  rRect(bx-1.5*s,oy+bs+1.5*s,3*s,9.5*s,1.5*s,skin);
  R(bx-.5*s,oy+bs+2*s,s,8*s,skinD); // shadow side
  rRect(bx-2*s,oy+bs+10*s,5*s,3.5*s,1.5*s,'#080808');
  rRect(bx-1.5*s,oy+bs+10.5*s,4*s,3*s,1.5*s,skinD);
  // Right arm
  rRect(bx+14*s,oy+bs+s,4*s,11*s,1.5*s,'#080808');
  rRect(bx+14.5*s,oy+bs+1.5*s,3*s,9.5*s,1.5*s,skin);
  R(bx+16*s,oy+bs+2*s,s,8*s,skinD);
  rRect(bx+13*s,oy+bs+10*s,5*s,3.5*s,1.5*s,'#080808');
  rRect(bx+13.5*s,oy+bs+10.5*s,4*s,3*s,1.5*s,skinD);

  if(pose==='wave'){cx.font=`${s*4.5}px serif`;cx.fillText('👋',bx+16*s,oy+bs-4*s);}
  if(pose==='fail'){cx.font=`${s*3.5}px serif`;cx.fillText('😵',ox+fW*.1,oy-s*2);}

  // SHORTS — gradient blue
  const shG=cx.createLinearGradient(bx,oy+bs+14*s,bx,oy+bs+22*s);
  shG.addColorStop(0,'#5090d0');shG.addColorStop(1,'#2060a0');
  rRect(bx+s,oy+bs+13*s,14*s,10*s,2*s,'#0a1a30'); // outline
  rRect(bx+2*s,oy+bs+14*s,12*s,8*s,2*s,shG);
  R(bx+7.5*s,oy+bs+14*s,1.5*s,8*s,'rgba(0,0,0,.3)'); // center seam

  // LEGS & SHOES
  const ly2=oy+bs+22*s;
  if(pose==='run1'){
    // back leg (right)
    rRect(bx+9*s,ly2,5*s,6*s,1.5*s,'#060606');rRect(bx+9.5*s,ly2+.5*s,4*s,5.5*s,1.5*s,skin);
    rRect(bx+9*s,ly2+5.5*s,7*s,4*s,1.5*s,'#060606');rRect(bx+9.5*s,ly2+6*s,6*s,3*s,1.5*s,'#eeeee8');
    R(bx+9*s,ly2+8.5*s,7*s,1.5*s,'#111');
    // front leg (left)
    rRect(bx+2*s,ly2,5*s,8*s,1.5*s,'#060606');rRect(bx+2.5*s,ly2+.5*s,4*s,7.5*s,1.5*s,skin);
    rRect(bx+.5*s,ly2+7.5*s,8*s,4*s,1.5*s,'#060606');rRect(bx+s,ly2+8*s,7*s,3*s,1.5*s,'#eeeee8');
    R(bx+.5*s,ly2+10.5*s,8*s,1.5*s,'#111');
  }else if(pose==='run2'){
    rRect(bx+3*s,ly2,5*s,6*s,1.5*s,'#060606');rRect(bx+3.5*s,ly2+.5*s,4*s,5.5*s,1.5*s,skin);
    rRect(bx+.5*s,ly2+5.5*s,8*s,4*s,1.5*s,'#060606');rRect(bx+s,ly2+6*s,7*s,3*s,1.5*s,'#eeeee8');
    R(bx+.5*s,ly2+8.5*s,8*s,1.5*s,'#111');
    rRect(bx+9*s,ly2,5*s,8*s,1.5*s,'#060606');rRect(bx+9.5*s,ly2+.5*s,4*s,7.5*s,1.5*s,skin);
    rRect(bx+9*s,ly2+7.5*s,7*s,4*s,1.5*s,'#060606');rRect(bx+9.5*s,ly2+8*s,6*s,3*s,1.5*s,'#eeeee8');
    R(bx+9*s,ly2+10.5*s,7*s,1.5*s,'#111');
  }else if(pose==='jump'){
    rRect(bx+s,ly2,5*s,5*s,1.5*s,'#060606');rRect(bx+1.5*s,ly2+.5*s,4*s,4.5*s,1.5*s,skin);
    rRect(bx+s,ly2+3*s,5*s,5*s,1.5*s,'#060606');rRect(bx+1.5*s,ly2+3.5*s,4*s,4.5*s,1.5*s,skin);
    rRect(bx-.5*s,ly2+6.5*s,8*s,4*s,1.5*s,'#060606');rRect(bx,ly2+7*s,7*s,3*s,1.5*s,'#eeeee8');
    rRect(bx+10*s,ly2,5*s,5*s,1.5*s,'#060606');rRect(bx+10.5*s,ly2+.5*s,4*s,4.5*s,1.5*s,skin);
    rRect(bx+10*s,ly2+3*s,5*s,5*s,1.5*s,'#060606');rRect(bx+10.5*s,ly2+3.5*s,4*s,4.5*s,1.5*s,skin);
    rRect(bx+10*s,ly2+6.5*s,8*s,4*s,1.5*s,'#060606');rRect(bx+10.5*s,ly2+7*s,7*s,3*s,1.5*s,'#eeeee8');
  }else if(pose==='dance'){
    const k=Math.sin(idleAnim*.3)*s*3;
    rRect(bx+2*s,ly2+k,5*s,7*s,1.5*s,'#060606');rRect(bx+2.5*s,ly2+.5*s+k,4*s,6.5*s,1.5*s,skin);
    rRect(bx+s,ly2+7*s+k,8*s,4*s,1.5*s,'#060606');rRect(bx+1.5*s,ly2+7.5*s+k,7*s,3*s,1.5*s,'#eeeee8');
    rRect(bx+9*s,ly2-k,5*s,7*s,1.5*s,'#060606');rRect(bx+9.5*s,ly2+.5*s-k,4*s,6.5*s,1.5*s,skin);
    rRect(bx+8*s,ly2+7*s-k,8*s,4*s,1.5*s,'#060606');rRect(bx+8.5*s,ly2+7.5*s-k,7*s,3*s,1.5*s,'#eeeee8');
  }else{
    rRect(bx+2*s,ly2,5*s,7*s,1.5*s,'#060606');rRect(bx+2.5*s,ly2+.5*s,4*s,6.5*s,1.5*s,skin);
    rRect(bx+s,ly2+7.5*s,8*s,4*s,1.5*s,'#060606');rRect(bx+1.5*s,ly2+8*s,7*s,3*s,1.5*s,'#eeeee8');
    R(bx+s,ly2+10.5*s,8*s,1.5*s,'#111');
    rRect(bx+9*s,ly2,5*s,7*s,1.5*s,'#060606');rRect(bx+9.5*s,ly2+.5*s,4*s,6.5*s,1.5*s,skin);
    rRect(bx+9*s,ly2+7.5*s,8*s,4*s,1.5*s,'#060606');rRect(bx+9.5*s,ly2+8*s,7*s,3*s,1.5*s,'#eeeee8');
    R(bx+9*s,ly2+10.5*s,8*s,1.5*s,'#111');
  }

  cx.restore();
}

let s1={};
function initStage1(){
  s1={
    vy:0,y:0,onGround:true,
    spd:5,frame:0,runF:0,runT:0,inv:0,
    obs:[],cols:[],
    nextObs:80,nextCol:100,
    gndX:0,bldX:0,
    clouds:[{x:60,y:35,w:100},{x:260,y:55,w:130},{x:500,y:30,w:110},{x:680,y:50,w:120},{x:380,y:22,w:90}],
    particles:[],floats:[],
    alive:true,done:false,doneTimer:0,
    timeLeft:45,timeMax:45,
    score:0,
  };
  s1.y=GY1-CHAR_H1;
}
const GY1=H-62,CHAR_H1=150,CHAR_W1=60;

function updateStage1(dt){
  if(s1.done){s1.doneTimer--;if(s1.doneTimer<=0)setScreen('trans1');return;}
  if(!s1.alive){s1.doneTimer--;if(s1.doneTimer<=0){if(globalLives>0)initStage1();else setScreen('finale');}return;}

  s1.frame++;s1.spd=Math.min(5+s1.frame/200,11);
  s1.vy+=1.15;s1.y+=s1.vy;
  if(s1.y>=GY1-CHAR_H1){s1.y=GY1-CHAR_H1;s1.vy=0;s1.onGround=true;}
  s1.gndX=(s1.gndX-s1.spd)%32;s1.bldX=(s1.bldX-s1.spd*.3);
  if(s1.bldX<-W)s1.bldX=0;
  s1.clouds.forEach(c=>{c.x-=.5;if(c.x<-c.w-40){c.x=W+30;c.y=18+Math.random()*60;}});
  s1.runT++;if(s1.runT>=6){s1.runT=0;s1.runF=(s1.runF+1)%2;}
  if(s1.inv>0)s1.inv--;
  s1.timeLeft-=dt/1000;
  if(s1.timeLeft<=0){s1.done=true;s1.doneTimer=90;snd.stagewin();}

  if(--s1.nextObs<=0){
    const types=[{w:44,h:46,draw:drawBox1},{w:28,h:36,draw:drawBag1},{w:56,h:44,draw:drawDog1}];
    const t=types[Math.floor(Math.random()*types.length)];
    s1.obs.push({x:W+20,y:GY1-t.h,...t});
    s1.nextObs=55+Math.floor(Math.random()*70);
  }
  if(--s1.nextCol<=0){
    const types=[{w:28,h:30,pts:10,draw:drawBurgerItem,yoff:55},{w:24,h:30,pts:5,draw:drawHeladoItem,yoff:70},{w:26,h:26,pts:30,draw:drawStar1,yoff:80}];
    const t=types[Math.floor(Math.random()*types.length)];
    s1.cols.push({x:W+20,y:GY1-t.yoff,...t,phase:Math.random()*Math.PI*2});
    s1.nextCol=60+Math.floor(Math.random()*90);
  }

  s1.obs=s1.obs.filter(o=>{
    o.x-=s1.spd;
    if(s1.inv<=0&&hits(80+8,s1.y+20,CHAR_W1-16,CHAR_H1-25,o.x,o.y,o.w,o.h)){
      snd.hit();globalLives--;s1.inv=100;
      spawnParts1(80+30,s1.y+60,'#ff4040');updateHUD();
      if(globalLives<=0){s1.alive=false;s1.doneTimer=80;snd.over();}
    }
    return o.x>-80;
  });
  s1.cols=s1.cols.filter(c=>{
    c.x-=s1.spd;c.y=GY1-c.yoff+Math.sin(s1.frame*.07+c.phase)*6;
    if(hits(80+8,s1.y+20,CHAR_W1-16,CHAR_H1-25,c.x,c.y,c.w,c.h,4)){
      s1.score+=c.pts;totalScore+=c.pts;snd.coin();
      spawnParts1(c.x+c.w/2,c.y+c.h/2,'#ffd040',10);
      s1.floats.push({x:c.x+c.w/2,y:c.y-10,txt:`+${c.pts}`,life:40});
      updateHUD();return false;
    }
    return c.x>-60;
  });
  s1.particles=s1.particles.filter(p=>{
    p.x+=p.vx||0;p.y+=p.vy||0;
    if(p.vy!==undefined)p.vy+=.25;
    p.life--;return p.life>0;
  });
  s1.floats=s1.floats.filter(f=>{f.y-=.9;f.life--;return f.life>0;});
}

function spawnParts1(x,y,c,n=8){
  // Expanding ring
  s1.particles.push({x,y,life:22,maxLife:22,c,type:'ring',startR:6,endR:38});
  // Sparks
  for(let i=0;i<n;i++){
    const a=Math.PI*2/n*i+Math.random()*.5;
    s1.particles.push({x,y,vx:Math.cos(a)*(2+Math.random()*3.5),vy:Math.sin(a)*3.5-2,
      life:30,maxLife:30,r:2.5+Math.random()*2,c,type:'spark'});
  }
}

function drawDog1(x,y){

  cx.beginPath();cx.ellipse(x+28,y+24,24,12,0,0,Math.PI*2);cx.fillStyle=dd;cx.fill();
  cx.beginPath();cx.ellipse(x+28,y+22,22,10,0,0,Math.PI*2);cx.fillStyle=dc;cx.fill();
  // Spot
  fillC(x+20,y+22,5,dd);
  // Head
  cx.beginPath();cx.ellipse(x+8,y+20,14,12,-.2,0,Math.PI*2);cx.fillStyle=dc;cx.fill();
  // Ears
  cx.fillStyle=dd;cx.beginPath();cx.ellipse(x+5,y+10,5,8,-.4,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(x+14,y+9,4,7,-.2,0,Math.PI*2);cx.fill();
  // Muzzle
  cx.beginPath();cx.ellipse(x+3,y+22,6,5,.1,0,Math.PI*2);cx.fillStyle=dl;cx.fill();
  // Eye
  fillC(x+8,y+16,3,'#fff');fillC(x+9,y+16,1.5,'#1a1a1a');
  // Nose
  fillC(x+1,y+20,2,'#222');
  // Legs (running animation)
  const legAnim=Math.sin(frameCount*.35)*8;
  [[10,y+34,4,14+legAnim],[18,y+34,4,12-legAnim*.5],[30,y+32,4,14-legAnim],[42,y+32,4,13+legAnim*.8]].forEach(([lx,ly,r,len])=>{
    cx.strokeStyle='#080606';cx.lineWidth=10;cx.lineCap='round';
    cx.beginPath();cx.moveTo(x+lx,ly);cx.lineTo(x+lx+(legAnim>0?3:-3),ly+Math.abs(len));cx.stroke();
    cx.strokeStyle=dd;cx.lineWidth=7;
    cx.beginPath();cx.moveTo(x+lx,ly);cx.lineTo(x+lx+(legAnim>0?3:-3),ly+Math.abs(len)-2);cx.stroke();
  });
}

// ── DRAW STAGE 1 — SEGA STYLE ──
function drawStage1(){
  // Update parallax accumulators
  if(s1.frame>0){
    _pFar=(_pFar+s1.spd*.09)%(W+500);
    _pMid=(_pMid+s1.spd*.22)%(W+400);
  }

  // SKY — vivid Sega blue
  const sky=cx.createLinearGradient(0,0,0,GY1);
  sky.addColorStop(0,'#1048d8');sky.addColorStop(.5,'#2878f8');sky.addColorStop(1,'#80c8ff');
  cx.fillStyle=sky;cx.fillRect(0,0,W,GY1);

  // SUN with glow
  cx.save();cx.shadowColor='#ffe840';cx.shadowBlur=50;
  gradC(700,55,30,'#ffff80','#ffe840');cx.restore();
  // Sun rays
  cx.save();cx.globalAlpha=.15;cx.strokeStyle='#ffe840';cx.lineWidth=2;
  for(let i=0;i<10;i++){
    const a=i/10*Math.PI*2;
    cx.beginPath();cx.moveTo(700+Math.cos(a)*34,55+Math.sin(a)*34);
    cx.lineTo(700+Math.cos(a)*55,55+Math.sin(a)*55);cx.stroke();
  }
  cx.restore();

  // LAYER 1: FAR silhouette city (dark navy blue)
  const farColors=['#1a1035','#151028','#20153a','#18103080','#1c1438'];
  for(let i=0;i<7;i++){
    const bx=((i*180-_pFar+600)%(W+400))-200;
    const bh=50+[60,90,45,80,70,55,100][i];
    cx.fillStyle=farColors[i%5];
    cx.fillRect(bx,GY1-bh,100,bh);
    // Simple window dots
    cx.fillStyle='rgba(255,240,150,.08)';
    for(let wy=GY1-bh+10;wy<GY1-10;wy+=18)
      for(let wx=bx+8;wx<bx+92;wx+=16)
        cx.fillRect(wx,wy,6,9);
  }

  // LAYER 2: MID buildings - Buenos Aires neighborhood
  const midPalette=['#c09870','#a07858','#b09078','#d0a888','#b88060'];
  const accentColor='#c85a1a';
  for(let i=0;i<6;i++){
    const bx=((i*195+s1.bldX+400)%(W+400))-200;
    const bh=70+[40,65,35,80,45,60][i];
    const col=midPalette[i%5];
    // Building body
    cx.fillStyle='#3a1a00';cx.fillRect(bx-1,GY1-bh-1,104,bh+2);
    cx.fillStyle=col;cx.fillRect(bx,GY1-bh,102,bh);
    // Window glow
    for(let wy=GY1-bh+12;wy<GY1-14;wy+=20){
      for(let wx=bx+10;wx<bx+92;wx+=20){
        const lit=Math.random()>.25;
        if(lit){
          cx.fillStyle='rgba(255,230,120,.7)';
          cx.fillRect(wx,wy,10,13);
          cx.fillStyle='rgba(255,255,150,.3)';
          cx.fillRect(wx+2,wy+2,6,4);
        }else{
          cx.fillStyle='rgba(0,0,20,.5)';
          cx.fillRect(wx,wy,10,13);
        }
      }
    }
    // Awning / highlight stripe
    if(i===2){
      cx.fillStyle='#e8961e';
      for(let k=0;k<5;k++)cx.fillRect(bx+k*20,GY1-50,10,8);
      cx.fillStyle='#fff';cx.font='bold 9px "Bebas Neue",sans-serif';
      cx.textAlign='center';cx.fillText('EL CARRO',bx+50,GY1-40);cx.textAlign='left';
    }
    // Roof details
    cx.fillStyle='#5a3010';cx.fillRect(bx,GY1-bh,102,6);
    cx.fillStyle='rgba(0,0,0,.3)';cx.fillRect(bx,GY1-bh,102,2);
  }

  // CLOUDS — Sonic style fluffy
  s1.clouds.forEach(c=>drawCloud(c.x,c.y,c.w));

  // SIDEWALK / CURB strip
  gradRect(0,GY1-8,W,12,'#a09488','#7a7068');
  cx.fillStyle='#b8aca0';cx.fillRect(0,GY1-8,W,4);
  cx.fillStyle='rgba(255,255,255,.2)';cx.fillRect(0,GY1-8,W,1);

  // CHECKER GROUND — Sonic style
  const sz=32;
  const gOffset=Math.abs(s1.gndX)%(sz*2);
  const rows=Math.ceil((H-GY1)/sz)+1;
  const cols=Math.ceil(W/sz)+3;
  for(let row=0;row<rows;row++){
    for(let col=0;col<cols+1;col++){
      const gx=col*sz-gOffset;
      const gy=GY1+row*sz;
      cx.fillStyle=(col+row)%2===0?'#38a020':'#2a7814';
      cx.fillRect(gx,gy,sz,sz);
    }
  }
  // Bright grass edge
  gradRect(0,GY1,W,6,'#60d030','#38a020');
  // Grid lines on ground
  cx.strokeStyle='rgba(0,0,0,.12)';cx.lineWidth=1;
  for(let col=0;col<cols+1;col++){const gx=col*sz-gOffset;cx.beginPath();cx.moveTo(gx,GY1);cx.lineTo(gx,H);cx.stroke();}
  for(let row=0;row<rows;row++){const gy=GY1+row*sz;cx.beginPath();cx.moveTo(0,gy);cx.lineTo(W,gy);cx.stroke();}

  // Yellow dashes on curb
  cx.fillStyle='#ffe040';
  const dashOff=(Math.abs(s1.gndX)*1.8)%60;
  for(let dx=-60+dashOff;dx<W+60;dx+=60)cx.fillRect(dx,GY1-3,36,3);

  // SPEED LINES (when fast)
  if(s1.spd>6.5){
    const lineAlpha=Math.min(.55,(s1.spd-6.5)/4);
    cx.save();cx.globalAlpha=lineAlpha;cx.strokeStyle='#fff';
    for(let i=0;i<10;i++){
      const ly=s1.y+20+i*13+Math.sin(frameCount*.3+i)*5;
      const len=35+Math.random()*70;
      cx.lineWidth=i%2===0?2:1;
      cx.beginPath();cx.moveTo(75,ly);cx.lineTo(75-len,ly);cx.stroke();
    }
    cx.restore();
  }

  // Objects
  s1.obs.forEach(o=>o.draw(o.x,o.y));
  s1.cols.forEach(c=>{
    cx.save();cx.shadowColor='#ffd040';cx.shadowBlur=18;
    c.draw(c.x,c.y,s1.frame);
    cx.restore();
  });

  // MAMILA with shadow
  const pose=!s1.alive?'fail':!s1.onGround?'jump':s1.runF===0?'run1':'run2';
  drawMamila(80,s1.y,3,pose,s1.inv);

  // PARTICLES
  s1.particles.forEach(p=>{
    const alpha=(p.life/(p.maxLife||30));
    cx.save();cx.globalAlpha=alpha;
    if(p.type==='ring'){
      const progress=1-p.life/(p.maxLife||22);
      const cr=p.startR+progress*(p.endR-p.startR);
      cx.shadowColor=p.c;cx.shadowBlur=8;
      cx.strokeStyle=p.c;cx.lineWidth=3-progress*2;
      cx.beginPath();cx.arc(p.x,p.y,cr,0,Math.PI*2);cx.stroke();
    }else{
      cx.shadowColor=p.c;cx.shadowBlur=10;
      fillC(p.x,p.y,p.r||3,p.c);
    }
    cx.restore();
  });

  // FLOAT TEXTS — score popups
  s1.floats.forEach(f=>{
    const a=f.life/40;
    cx.save();cx.globalAlpha=a;cx.textAlign='center';
    cx.font='bold 15px "Bebas Neue",sans-serif';
    cx.shadowColor='#ffd040';cx.shadowBlur=12;
    txtOut(f.txt,f.x,f.y,'#ffd040','#000',4);
    cx.restore();
  });
  cx.textAlign='left';

  // TIMER BAR
  const tw=W-40,pct=s1.timeLeft/s1.timeMax;
  const timerColor=pct>.5?'#40e040':pct>.25?'#ffd040':'#ff3030';
  R(20,H-16,tw,7,'rgba(0,0,0,.5)');
  gradRect(20,H-16,tw*Math.max(0,pct),7,timerColor,timerColor+'88');
  cx.strokeStyle='rgba(255,255,255,.15)';cx.lineWidth=1;cx.strokeRect(20,H-16,tw,7);
  cx.font='10px "Barlow Condensed",monospace';cx.fillStyle=timerColor;
  cx.fillText(`⏱ ${Math.ceil(Math.max(0,s1.timeLeft))}s`,W-54,H-9);

  // TAP HINT on mobile
  if(s1.onGround&&s1.frame<120&&s1.alive){
    cx.save();cx.globalAlpha=.5-Math.min(.5,s1.frame/120*.5);
    cx.textAlign='center';cx.font='bold 18px "Bebas Neue",sans-serif';
    cx.shadowColor='#fff';cx.shadowBlur=10;
    cx.strokeStyle='#000';cx.lineWidth=3;cx.strokeText('TAP = SALTAR',W/2,GY1-18);
    cx.fillStyle='#fff';cx.fillText('TAP = SALTAR',W/2,GY1-18);
    cx.restore();cx.textAlign='left';
  }

  // DONE OVERLAY
  if(s1.done){
    cx.fillStyle='rgba(0,0,0,.65)';cx.fillRect(0,0,W,H);
    cx.textAlign='center';
    withGlow(()=>txtOut('¡LLEGASTE!',W/2,H/2-20,'#ffd040','#000',6),'#ffd040',25);
    cx.font='bold 52px "Bebas Neue",sans-serif';
    cx.font='22px "Barlow Condensed",sans-serif';cx.fillStyle='#e8961e';
    cx.fillText(`+${s1.score} puntos del mercado`,W/2,H/2+22);
    cx.textAlign='left';
  }
  if(!s1.alive&&!s1.done){
    cx.fillStyle='rgba(0,0,0,.65)';cx.fillRect(0,0,W,H);
    cx.textAlign='center';cx.font='bold 54px "Bebas Neue",sans-serif';
    txtOut('¡UY!',W/2,H/2,'#ff4040','#000',6);
    cx.textAlign='left';
  }
}

function drawPanB(x,y,s){
  const g=cx.createLinearGradient(x,y+s*2,x,y+s*6);
  g.addColorStop(0,'#e0943a');g.addColorStop(1,'#a05018');
  rRect(x,y+s*2,s*8,s*4,s,g);

function drawLechuga(x,y,s){

function drawTomate(x,y,s){

function drawCebolla(x,y,s){
  const rings=['#e088e8','#d070d0','#c058c0'];
  rRect(x,y+s,s*8,s*4,s,rings[2]);

function drawBacon(x,y,s){
  for(let i=0;i<8;i++){

const RECIPES=[

];

let s2={};
const ING_KEYS=Object.keys(INGREDIENTS);
const IW=72,IH=64;

function initStage2(){
  s2={recipe:null,built:[],timeLeft:0,timeMax:0,
    ordersDone:0,ordersMax:5,score:0,
    overlay:null,overlayTimer:0,lastPts:0,
    mood:'idle',moodTimer:0,shake:0,
    ingBtns:[],done:false,doneTimer:0,
  };
  buildIngBtns2();nextOrder2();
}

function buildIngBtns2(){
  // Mobile: 2 rows of 4, bigger buttons
  const mIW=94,mIH=76,cols=4,pad=4;
  const rowW=cols*(mIW+pad),startX=(W-rowW)/2;
  s2.ingBtns=ING_KEYS.map((k,i)=>({
    key:k,
    x:startX+(i%cols)*(mIW+pad),
    y:H-mIH*2-pad*3+(Math.floor(i/cols))*(mIH+pad),
    w:mIW,h:mIH,flash:0
  }));
}

function nextOrder2(){
  const diff=Math.min(Math.floor(s2.ordersDone/2),2);
  const pool=RECIPES.filter((_,i)=>Math.floor(i/2)<=diff);
  s2.recipe=pool[Math.floor(Math.random()*pool.length)];
  s2.built=[];
  s2.timeMax=9000+s2.recipe.layers.length*1000-s2.ordersDone*150;
  s2.timeMax=Math.max(s2.timeMax,5000);
  s2.timeLeft=s2.timeMax;
  s2.mood='idle';
}

function updateStage2(dt){
  if(s2.done){s2.doneTimer--;if(s2.doneTimer<=0)setScreen('trans2');return;}
  if(s2.shake>0)s2.shake=Math.max(0,s2.shake-.5);
  if(s2.moodTimer>0){s2.moodTimer--;if(s2.moodTimer===0)s2.mood='idle';}
  if(s2.overlay){
    s2.overlayTimer--;
    if(s2.overlayTimer<=0){
      s2.overlay=null;s2.ordersDone++;
      if(s2.ordersDone>=s2.ordersMax){s2.done=true;s2.doneTimer=100;snd.stagewin();}
      else nextOrder2();
    }
    return;
  }
  s2.timeLeft-=dt;
  if(s2.timeLeft<=0){
    s2.timeLeft=0;snd.wrong();s2.mood='angry';s2.moodTimer=999;
    s2.overlay='timeout';s2.overlayTimer=80;
  }
  if(s2.timeLeft/s2.timeMax<.3&&s2.mood==='idle')s2.mood='worried';
}

function clickIngredient2(key,btn){
  if(!s2.recipe||s2.overlay)return;
  const next=s2.recipe.layers[s2.built.length];
  if(key===next){
    s2.built.push(key);btn.flash=8;snd.pick();s2.mood='happy';s2.moodTimer=20;
    if(s2.built.length===s2.recipe.layers.length){
      const tb=Math.floor((s2.timeLeft/s2.timeMax)*50);
      s2.lastPts=20+tb+(s2.ordersDone+1)*5;
      s2.score+=s2.lastPts;totalScore+=s2.lastPts;
      snd.perfect();s2.mood='happy';s2.moodTimer=60;
      s2.overlay='success';s2.overlayTimer=85;updateHUD();
    }
  }else{
    btn.flash=10;snd.wrong();s2.shake=8;s2.mood='angry';s2.moodTimer=40;
    s2.built=[];s2.timeLeft=Math.max(0,s2.timeLeft-2000);
    s2.overlay='fail';s2.overlayTimer=45;
  }
}

    }else{

    cx.fillStyle=isNext?col:'#554433';cx.font='bold 11px "Barlow Condensed",sans-serif';
    cx.textAlign='center';cx.fillText(INGREDIENTS[btn.key].label.substring(0,8),btn.x+btn.w/2,btn.y+btn.h-3);
    cx.textAlign='left';
    if(btn.flash>0)btn.flash--;
  });

  // OVERLAYS
  if(s2.overlay){
    cx.fillStyle='rgba(0,0,0,.6)';cx.fillRect(0,0,W,H);cx.textAlign='center';
    cx.font='bold 52px "Bebas Neue",sans-serif';

      cx.font='22px "Barlow Condensed",sans-serif';cx.fillStyle='#e8961e';cx.fillText(`+${s2.lastPts} puntos`,W/2,H/2+22);
    }else if(s2.overlay==='fail'){

    }else{

}

let s3={};
function initStage3(){

function spawnCmd3(){
  const c=CMDS[Math.floor(Math.random()*CMDS.length)];
  const diff=Math.min(s3.takes/3,1);
  s3.cmdMax=Math.floor(2800-diff*1000);s3.cmdMax=Math.max(s3.cmdMax,1200);
  s3.cmdTimer=s3.cmdMax;s3.rapid=0;s3.rapidNeed=5;
  s3.cmd=c;s3.zoneGlow=c.zone;snd.appear();

function spawnComment3(text,color='#fff'){
  s3.comments.push({text,y:H-80,alpha:1,color,vy:1.2+Math.random()*.8});
  if(s3.comments.length>12)s3.comments.shift();

function spawnHearts3(n=5){
  for(let i=0;i<n;i++){
    s3.hearts.push({x:S3L+10+Math.random()*280,y:H-60-Math.random()*40,
      alpha:1,vy:1.8+Math.random()*2,vx:(Math.random()-.5)*1.5,size:14+Math.random()*14});
  }
}
function resolveCmd3(ok){
  if(!s3.cmd)return;
  s3.takes++;s3.zoneGlow=null;
  if(ok){
    const sp=s3.cmdTimer/s3.cmdMax;
    s3.lastPts=sp>.7?30:15;
    s3.score+=s3.lastPts;totalScore+=s3.lastPts;
    s3.reelPct=Math.min(100,s3.reelPct+13);
    s3.result=sp>.7?'perfect':'ok';
    if(s3.result==='perfect'){
      snd.perfect();
      s3.viewsTarget+=Math.floor(800+Math.random()*1200);
      s3.likes+=Math.floor(50+Math.random()*80);
      spawnHearts3(8);
      spawnComment3(COMMENTS_PERFECT[Math.floor(Math.random()*COMMENTS_PERFECT.length)],'#ffd040');
      spawnComment3(COMMENTS_OK[Math.floor(Math.random()*COMMENTS_OK.length)],'#fff');
    }else{
      snd.success();
      s3.viewsTarget+=Math.floor(200+Math.random()*400);
      s3.likes+=Math.floor(15+Math.random()*30);
      spawnHearts3(3);
      spawnComment3(COMMENTS_OK[Math.floor(Math.random()*COMMENTS_OK.length)],'#fff');
    }
    s3.pose=s3.cmd.pose;s3.poseTimer=60;updateHUD();
  }else{
    globalLives--;s3.glitch=30;
    s3.reelPct=Math.max(0,s3.reelPct-8);
    s3.result='fail';snd.wrong();updateHUD();
    spawnComment3(COMMENTS_FAIL[Math.floor(Math.random()*COMMENTS_FAIL.length)],'#ff6060');
  }
  s3.resultTimer=55;s3.cmd=null;
  if(globalLives<=0||s3.takes>=s3.takesMax){setTimeout(()=>setScreen('finale'),900);}
  else{s3.waitTimer=45;}
}

function updateStage3(dt){
  if(s3.done)return;
  // Views easing toward target
  s3.views+=(s3.viewsTarget-s3.views)*.04;
  s3.viewsTarget+=Math.random()<.3?1:0; // organic slow growth
  // Comments float up
  s3.comments=s3.comments.filter(c=>{c.y-=c.vy;c.alpha-=.008;return c.alpha>0;});
  // Hearts float up
  s3.hearts=s3.hearts.filter(h=>{h.y-=h.vy;h.x+=h.vx;h.alpha-=.02;return h.alpha>0;});
  if(s3.resultTimer>0){s3.resultTimer--;return;}
  if(s3.waitTimer>0){s3.waitTimer--;if(s3.waitTimer===0)spawnCmd3();return;}
  if(s3.cmd){
    s3.cmdTimer-=dt;
    if(s3.cmdTimer<=0){s3.cmdTimer=0;if(s3.cmd.zone==='freeze')resolveCmd3(true);else resolveCmd3(false);}
  }
  if(s3.poseTimer>0)s3.poseTimer--;
  if(s3.glitch>0)s3.glitch--;
}

    }
    cx.restore();cx.textAlign='left';
  }
  if(s3.waitTimer>0&&s3.waitTimer<35){
    cx.save();cx.globalAlpha=.5;cx.textAlign='center';
    cx.font='16px "Bebas Neue",sans-serif';cx.fillStyle='#fff';
    cx.fillText('PRÓXIMA TOMA...',SL/2,H-22);cx.restore();cx.textAlign='left';
  }
}

function drawTransition(){
  gradRect(0,0,W,H,'#04020e','#0e080a');

  for(let i=0;i<14;i++){
    const a=i/14*Math.PI*2+idleAnim*.025;

  for(let i=0;i<8;i++){

  cx.save();cx.shadowColor='#e8961e';cx.shadowBlur=35;

  cx.textAlign='center';
  const lines=transMsg.split('\n');

  // Progress dots

    cx.font='26px "Bebas Neue",sans-serif';txtOut('El reel salió perfecto 🔥',W/2,162,'#fff','#000',4);
  }else{
    cx.font='bold 58px "Bebas Neue",sans-serif';
    withGlow(()=>txtOut('¡SE ARRUINÓ EL REEL!',W/2,120,'#ff4040','#000',6),'#ff4040',25);
  }

  // Score box
  rRect(W/2-160,195,320,60,8,'rgba(0,0,0,.6)');
  rRectS(W/2-160,195,320,60,8,'#e8961e',2);
  cx.font='bold 32px "Bebas Neue",sans-serif';
  withGlow(()=>txtOut(`PUNTOS: ${totalScore}`,W/2,232,'#ffd040','#000',5),'#ffd040',20);

  if(totalScore>=bestScore&&totalScore>0){
    cx.font='bold 15px "Barlow Condensed",sans-serif';
    withGlow(()=>txtOut('★  NUEVO RÉCORD  ★',W/2,270,'#ffe040','#000',3),'#ffd040',15);
    bestScore=totalScore;localStorage.setItem('mamilaBest',bestScore);
  }else if(bestScore>0){
    cx.fillStyle='#444';cx.font='13px "Barlow Condensed",sans-serif';cx.fillText(`MEJOR: ${bestScore}`,W/2,268);
  }

  // Stage icons
  cx.font='13px "Barlow Condensed",sans-serif';
  ['🛒 Mercado','🍔 Cocina','🎬 Videito'].forEach((l,i)=>{
    cx.fillStyle=`rgba(232,150,30,${.4+i*.15})`;cx.fillText(l,W/2-120+i*120,H-98);
  });

  if(Math.floor(Date.now()/600)%2){
    cx.font='bold 15px "Barlow Condensed",sans-serif';
    withGlow(()=>txtOut('[ CLICK ] para jugar de nuevo',W/2,H-26,'#fff','#000',3),'#80c0ff',12);
  }
  cx.textAlign='left';
}

// ══════════════════════════════════════════════════
//  COLLISION HELPER
// ══════════════════════════════════════════════════
function hits(ax,ay,aw,ah,bx,by,bw,bh,m=10){
  return ax+m<bx+bw-m&&ax+aw-m>bx+m&&ay+m<by+bh-m&&ay+ah-m>by+m;
}

// ══════════════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════════════
function handleClick(mx,my){
  if(AC.state==='suspended')AC.resume();
  if(SCREEN==='title'){setScreen('map');return;}
  if(SCREEN==='map'){
    MAP_NODES.forEach(n=>{if(Math.hypot(mx-n.x,my-n.y)<54)setScreen(n.stage);});return;
  }
  if(SCREEN==='trans1'||SCREEN==='trans2'){if(transTimer<120)transTimer=0;return;}
  if(SCREEN==='finale'){totalScore=0;globalLives=3;bestScore=+localStorage.getItem('mamilaBest')||0;setScreen('title');updateHUD();return;}
  if(SCREEN==='s1'){
    if(!s1.alive&&!s1.done)return;
    if(s1.onGround){s1.vy=-22;s1.onGround=false;snd.jump();}
    return;
  }
  if(SCREEN==='s2'){
    s2.ingBtns.forEach(btn=>{if(mx>=btn.x&&mx<=btn.x+btn.w&&my>=btn.y&&my<=btn.y+btn.h)clickIngredient2(btn.key,btn);});return;
  }
  if(SCREEN==='s3'){
    if(!s3.cmd||s3.resultTimer>0)return;
    const cmd=s3.cmd;
    if(cmd.zone==='freeze'){resolveCmd3(false);return;}
    if(cmd.zone==='rapid'){snd.tap();s3.rapid++;if(s3.rapid>=s3.rapidNeed)resolveCmd3(true);return;}
    const z=ZONES3[cmd.zone];
    if(z&&mx>=z.x&&mx<=z.x+z.w&&my>=z.y&&my<=z.y+z.h)resolveCmd3(true);else resolveCmd3(false);
  }
}

cv.addEventListener('click',e=>{
  const r=cv.getBoundingClientRect();
  handleClick((e.clientX-r.left)*(W/r.width),(e.clientY-r.top)*(H/r.height));
});
cv.addEventListener('touchstart',e=>{
  e.preventDefault();e.stopPropagation();
  const r=cv.getBoundingClientRect();
  handleClick((e.touches[0].clientX-r.left)*(W/r.width),(e.touches[0].clientY-r.top)*(H/r.height));
},{passive:false});
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();
    if(SCREEN==='s1'&&s1.onGround){s1.vy=-22;s1.onGround=false;snd.jump();}
    else handleClick(W/2,H/2);
  }
});
cv.addEventListener('mousemove',e=>{
  if(SCREEN!=='map')return;
  const r=cv.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);
  mapHover=MAP_NODES.findIndex(n=>Math.hypot(mx-n.x,my-n.y)<60);
  cv.style.cursor=mapHover>=0?'pointer':'default';
});

// ══════════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════════
function loop(ts){
  const dt=Math.min(ts-lastTime,50);lastTime=ts;
  frameCount++;idleAnim+=.04;
  cx.clearRect(0,0,W,H);

  if(SCREEN==='title')drawTitle();
  else if(SCREEN==='map')drawMap();
  else if(SCREEN==='s1'){updateStage1(dt);drawStage1();}
  else if(SCREEN==='s2'){updateStage2(dt);drawStage2();}
  else if(SCREEN==='s3'){updateStage3(dt);drawStage3();}
  else if(SCREEN==='trans1'||SCREEN==='trans2'){
    drawTransition();transTimer--;
    if(transTimer<=0){if(SCREEN==='trans1')setScreen('s2');else setScreen('s3');}
  }
  else if(SCREEN==='finale')drawFinale();
  drawHUD();
  drawRotatePrompt();

  requestAnimationFrame(loop);
}

// ── RESIZE CANVAS TO FIT SCREEN ──
function resizeCanvas(){
  const aspect=2;
  let w=window.innerWidth,h=window.innerHeight;
  if(w/h>aspect){w=h*aspect;}else{h=w/aspect;}
  // Keep internal resolution, scale with CSS
  cv.style.width=Math.round(w)+'px';
  cv.style.height=Math.round(h)+'px';
}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();

// ── PORTRAIT ROTATE PROMPT ──
function drawRotatePrompt(){
  const isPortrait=window.innerWidth<window.innerHeight;
  if(!isPortrait)return;
  cx.save();cx.fillStyle='rgba(4,2,10,.95)';cx.fillRect(0,0,W,H);
  cx.textAlign='center';
  cx.font='60px serif';cx.fillText('📱',W/2,H/2-50);
  cx.font='bold 38px "Bebas Neue",sans-serif';
  cx.shadowColor='#e8961e';cx.shadowBlur=20;
  cx.strokeStyle='#000';cx.lineWidth=5;cx.lineJoin='round';
  cx.strokeText('GIRÁ EL TELÉFONO',W/2,H/2+10);
  cx.fillStyle='#ffd040';cx.fillText('GIRÁ EL TELÉFONO',W/2,H/2+10);
  cx.shadowBlur=0;cx.fillStyle='#e8961e';cx.font='18px "Barlow Condensed",sans-serif';
  cx.fillText('El juego funciona en modo horizontal →',W/2,H/2+44);
  cx.restore();
}

face.onload=()=>requestAnimationFrame(loop);
face.onerror=()=>requestAnimationFrame(loop);
</script>
